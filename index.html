<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rent-A-Teenager</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Kalam:wght@400;700&family=Karla:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#f2e9d8;
    --paper-dark:#e8dcc3;
    --corkboard:#a9825a;
    --ink:#2e2620;
    --pin-red:#c94f3d;
    --pin-blue:#3d6b8a;
    --select-gold:#c98a2e;
    --tape:#f7f1de;
    --line:#c9b892;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(circle at 20% 20%, rgba(0,0,0,0.06) 0, transparent 40%),
      radial-gradient(circle at 80% 60%, rgba(0,0,0,0.05) 0, transparent 45%),
      var(--corkboard);
    background-blend-mode:multiply;
    min-height:100vh;
    font-family:'Karla',sans-serif;
    color:var(--ink);
  }
  body::before{
    content:"";
    position:fixed;inset:0;
    background-image:radial-gradient(rgba(0,0,0,0.15) 1px, transparent 1px);
    background-size:6px 6px;
    opacity:0.35;
    pointer-events:none;
    z-index:0;
  }
  h1,h2,h3,.headline{font-family:'Kalam',cursive;}
  #app{position:relative;z-index:1;max-width:720px;margin:0 auto;padding:24px 16px 60px;}

  .board-title{
    text-align:center;color:var(--tape);font-size:2.4rem;letter-spacing:1px;
    text-shadow:2px 2px 0 rgba(0,0,0,0.25);margin:8px 0 4px;transform:rotate(-1deg);
  }
  .board-sub{text-align:center;color:var(--tape);opacity:0.85;font-size:0.95rem;margin:0 0 24px;}

  .card{
    background:var(--paper);border-radius:2px;padding:24px;
    box-shadow:0 6px 16px rgba(0,0,0,0.35), 0 1px 0 rgba(255,255,255,0.4) inset;
    position:relative;margin-bottom:20px;
  }
  .card::before{
    content:"";position:absolute;top:-14px;left:50%;transform:translateX(-50%);
    width:26px;height:26px;background:radial-gradient(circle at 35% 30%, #e8746a, var(--pin-red));
    border-radius:50%;box-shadow:0 3px 4px rgba(0,0,0,0.4);
  }
  .card.pin-blue::before{background:radial-gradient(circle at 35% 30%, #6ea3c2, var(--pin-blue));}

  .eyebrow{text-transform:uppercase;letter-spacing:2px;font-size:0.7rem;font-weight:700;color:#8a7a5c;margin:0 0 6px;}
  h2.headline{font-size:1.6rem;margin:0 0 4px;}
  p.desc{margin:0 0 20px;color:#5c5142;font-size:0.92rem;line-height:1.4;}

  .role-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
  @media (max-width:480px){.role-grid{grid-template-columns:1fr;}}
  .role-btn{
    background:var(--tape);border:2px solid var(--ink);border-radius:2px;padding:22px 14px;
    text-align:center;cursor:pointer;font-family:'Kalam',cursive;font-size:1.25rem;
    transition:transform .12s ease, box-shadow .12s ease;box-shadow:3px 3px 0 rgba(0,0,0,0.25);
  }
  .role-btn:hover{transform:translate(-2px,-2px);box-shadow:5px 5px 0 rgba(0,0,0,0.25);}
  .role-btn:active{transform:translate(0,0);box-shadow:1px 1px 0 rgba(0,0,0,0.25);}
  .role-btn .emoji{font-size:2rem;display:block;margin-bottom:6px;}
  .role-btn .tag{display:block;font-family:'Karla',sans-serif;font-size:0.75rem;color:#7a6f5c;margin-top:4px;}

  label{display:block;font-weight:700;font-size:0.85rem;margin:14px 0 6px;}
  label:first-of-type{margin-top:0;}
  input{
    width:100%;padding:10px 12px;border:2px solid var(--line);border-radius:2px;
    background:#fffdf7;font-family:'Karla',sans-serif;font-size:1rem;color:var(--ink);
  }
  input:focus, button:focus-visible{outline:3px solid var(--pin-blue);outline-offset:1px;border-color:var(--pin-blue);}
  .error-msg{color:#a3271f;background:#f8dcd7;border:1px solid #e0a89f;padding:8px 10px;border-radius:2px;font-size:0.85rem;margin-top:10px;}
  .hint{font-size:0.78rem;color:#8a7a5c;margin-top:4px;}

  .btn{
    display:inline-block;font-family:'Kalam',cursive;font-size:1.05rem;background:var(--ink);color:var(--paper);
    border:none;border-radius:2px;padding:12px 22px;cursor:pointer;box-shadow:3px 3px 0 rgba(0,0,0,0.3);
    transition:transform .1s ease;
  }
  .btn:hover{transform:translateY(-1px);}
  .btn:active{transform:translateY(1px);box-shadow:1px 1px 0 rgba(0,0,0,0.3);}
  .btn.full{width:100%;margin-top:18px;text-align:center;}
  .btn.small{font-size:0.8rem;padding:6px 12px;box-shadow:2px 2px 0 rgba(0,0,0,0.3);}
  .btn[disabled]{opacity:0.5;cursor:default;}
  .link-back{display:inline-block;margin-top:14px;font-size:0.85rem;color:#6b6153;cursor:pointer;text-decoration:underline;background:none;border:none;font-family:'Karla',sans-serif;}

  .topbar{
    display:flex;justify-content:space-between;align-items:center;background:var(--tape);
    border:2px solid var(--ink);border-radius:2px;padding:12px 16px;margin-bottom:18px;
    box-shadow:3px 3px 0 rgba(0,0,0,0.25);flex-wrap:wrap;gap:8px;
  }
  .whoami{font-size:0.85rem;}
  .whoami strong{font-family:'Kalam',cursive;font-size:1.1rem;}
  .badge{display:inline-block;font-size:0.65rem;text-transform:uppercase;letter-spacing:1px;font-weight:700;padding:2px 8px;border-radius:10px;margin-left:6px;vertical-align:middle;}
  .badge.worker{background:#dcecd8;color:#2f5c2a;}
  .badge.employer{background:#dbe6ef;color:#26506e;}

  .tabs{display:flex;gap:8px;margin-bottom:16px;}
  .tab-btn{flex:1;font-family:'Kalam',cursive;font-size:0.9rem;padding:9px 4px;background:var(--paper-dark);border:2px solid var(--ink);border-radius:2px;cursor:pointer;color:var(--ink);white-space:nowrap;}
  .tab-btn.active{background:var(--ink);color:var(--paper);}

  .legend{display:flex;gap:16px;font-size:0.78rem;color:#5c5142;margin-bottom:10px;flex-wrap:wrap;}
  .legend span{display:inline-flex;align-items:center;gap:5px;}
  .legend .sw{width:11px;height:11px;border-radius:50%;display:inline-block;}

  .cal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
  .cal-header button{background:none;border:2px solid var(--ink);border-radius:50%;width:34px;height:34px;font-size:1rem;cursor:pointer;}
  .cal-title{font-family:'Kalam',cursive;font-size:1.3rem;}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
  .cal-dow{text-align:center;font-size:0.7rem;font-weight:700;color:#8a7a5c;padding-bottom:4px;}
  .cal-day{
    aspect-ratio:1/1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;
    border:1.5px solid var(--line);border-radius:4px;background:#fffdf7;cursor:pointer;
    font-size:0.85rem;user-select:none;padding-top:2px;
  }
  .cal-day.empty{border:none;background:transparent;cursor:default;}
  .cal-day.past{color:#c4b9a3;background:#ece3ce;cursor:not-allowed;}
  .cal-day .day-num{font-size:0.8rem;}
  .cal-day .dot-row{display:flex;gap:2px;height:13px;}
  .cal-day .dot{font-size:0.55rem;line-height:1;min-width:13px;height:13px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;}
  .cal-day .dot.dot-red{background:var(--pin-red);}
  .cal-day .dot.dot-blue{background:var(--pin-blue);}
  .cal-day.selected{background:var(--select-gold);border-color:var(--select-gold);}
  .cal-day.selected .day-num{color:#fff;font-weight:700;}
  .cal-day:not(.empty):not(.past):hover{border-color:var(--ink);}

  .save-row{display:flex;align-items:center;gap:12px;margin-top:16px;}
  .saved-flash{color:#2f5c2a;font-size:0.85rem;font-weight:700;opacity:0;transition:opacity .3s;}
  .saved-flash.show{opacity:1;}

  .listing{background:#fffdf7;border:1.5px solid var(--line);border-radius:2px;padding:14px 16px;margin-bottom:10px;}
  .listing-name{font-family:'Kalam',cursive;font-size:1.15rem;margin:0 0 4px;}
  .listing-meta{font-size:0.8rem;color:#7a6f5c;margin:0 0 8px;}
  .date-chip{display:inline-block;background:var(--paper-dark);border:1px solid var(--line);border-radius:10px;padding:2px 9px;font-size:0.78rem;margin:2px 4px 2px 0;}
  .empty-state{text-align:center;color:#8a7a5c;font-size:0.9rem;padding:30px 10px;font-style:italic;}
  .section-label{font-family:'Kalam',cursive;font-size:1.1rem;margin:22px 0 10px;border-bottom:2px dashed var(--line);padding-bottom:4px;}
  .section-label:first-of-type{margin-top:0;}

  .switch-link{background:none;border:none;color:#6b6153;font-size:0.78rem;text-decoration:underline;cursor:pointer;font-family:'Karla',sans-serif;}
  .loading-msg{color:var(--tape);text-align:center;padding:60px 0;font-family:'Kalam',cursive;font-size:1.2rem;}

  .tutorial-overlay{
    position:fixed;inset:0;z-index:50;background:rgba(20,15,10,0.5);
    display:flex;align-items:flex-start;justify-content:center;padding:16px;
    padding-top:max(16px, env(safe-area-inset-top));
  }
  .tutorial-popup{
    position:relative;z-index:52;
    background:var(--tape);border:2px solid var(--ink);border-radius:4px;padding:18px;
    max-width:480px;width:100%;box-shadow:0 4px 20px rgba(0,0,0,0.4);
    animation:tutorial-pop-in .2s ease;
  }
  @keyframes tutorial-pop-in{from{transform:translateY(-12px);opacity:0;}to{transform:translateY(0);opacity:1;}}
  .tutorial-popup p{margin:0 0 16px;font-size:1rem;line-height:1.4;font-family:'Kalam',cursive;}
  .tutorial-controls{display:flex;justify-content:space-between;align-items:center;gap:10px;}
  @keyframes tutorial-flash-anim{
    0%,100%{box-shadow:0 0 0 0 rgba(201,79,61,0.6);}
    50%{box-shadow:0 0 0 8px rgba(201,79,61,0);}
  }
  .tutorial-flash{
    animation:tutorial-flash-anim 1s ease-in-out infinite;
    position:relative;z-index:51;outline:3px solid var(--pin-red);outline-offset:2px;
  }
  @media (prefers-reduced-motion: reduce){
    .tutorial-flash{animation:none;outline:3px solid var(--pin-red);}
  }
  @media (prefers-reduced-motion: reduce){.role-btn, .btn{transition:none;}}
</style>
</head>
<body>
<div id="app"><div class="loading-msg">Pinning up the corkboard…</div></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc, deleteDoc, addDoc, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDcc9Xmpyp4SXPYIP4RRUq3tydoKN2dW38",
  authDomain: "work-edfd5.firebaseapp.com",
  projectId: "work-edfd5",
  storageBucket: "work-edfd5.firebasestorage.app",
  messagingSenderId: "959829996640",
  appId: "1:959829996640:web:ec1adcc2ed886526db3f05"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const EMPLOYER_PIN = "4321"; // just a shared screen-only code — no server-side enforcement
const SESSION_KEY = "rat-session";
const TUTORIAL_KEY_PREFIX = "rat-tutorial-done-";

const TUTORIAL_STEPS = {
  worker: [
    { target: null, switchTab: "calendar", text: "Quick tour of how this works — tap Next to keep going, or Skip whenever." },
    { target: "tab-calendar", switchTab: "calendar", text: "This is your Calendar. Tap any day to mark yourself available — tap it again to un-mark it." },
    { target: "confirm-btn", switchTab: "calendar", text: "Once you've picked your days, hit Confirm to save them." },
    { target: "tab-list", switchTab: "list", text: "List view shows every job that's been posted, including what it pays." },
    { target: "tab-matches", switchTab: "matches", text: "Matches shows you exactly which days line up between you and someone who needs help." },
    { target: "mark-worked-btn", switchTab: "matches", text: "After you've actually done the work, come back here and tap Mark days worked to log it." },
    { target: "tab-history", switchTab: "history", text: "History keeps a running log of every job you've completed." },
    { target: "settings-btn", switchTab: "history", text: "Settings lets you fix your info or delete your entry if you ever need to." },
    { target: null, switchTab: "calendar", text: "That's it — you're ready to go!" }
  ],
  employer: [
    { target: null, switchTab: "calendar", text: "Quick tour of how this works — tap Next to keep going, or Skip whenever." },
    { target: "tab-calendar", switchTab: "calendar", text: "This is your Calendar. Tap any day you need help — tap it again to remove it." },
    { target: "confirm-btn", switchTab: "calendar", text: "Hit Confirm once you've picked your days. Right after, you'll get a chance to describe the job and what it pays — totally optional." },
    { target: "tab-list", switchTab: "list", text: "List view shows worker availability and every request that's been posted." },
    { target: "resume-btn", switchTab: "list", text: "Tap Resume on any worker's card to see their completed job history before you bring them on." },
    { target: "tab-matches", switchTab: "matches", text: "Matches shows exactly which workers line up with the days you need help." },
    { target: "mark-worked-btn", switchTab: "matches", text: "Once a job's done, mark it here — it logs to History and clears those days off the calendar." },
    { target: "tab-history", switchTab: "history", text: "History shows every completed job on the board." },
    { target: "settings-btn", switchTab: "history", text: "Settings lets you manage entries or leave the board." },
    { target: null, switchTab: "calendar", text: "That's it — you're ready to go!" }
  ]
};

// ---------- state ----------
let view = "loading"; // loading | roleSelect | employerPin | employerName | workerName | workerInfo | main | employerJobInfo | settings | markWorked | resume
let currentUser = null; // { docId, role, ...profile }
let pendingWorker = null; // { first, last, slug } captured on name screen, completed on info screen
let mainTab = "calendar";
let calMonth = new Date().getMonth();
let calYear = new Date().getFullYear();
let selectedDates = new Set();
let formError = "";
let allWorkers = [];
let allEmployers = [];
let allCompletedWork = [];
let matchesCache = [];
let markWorkedContext = null; // { workerId, workerName, employerId, employerName, jobDescription, payRate, overlapDates }
let markWorkedSelected = new Set();
let resumeWorkerId = null;
let tutorialActive = null; // null | "worker" | "employer"
let tutorialStep = 0;
let unsubs = [];

const root = document.getElementById("app");

function hasTutorialBeenSeen(role){
  try { return localStorage.getItem(TUTORIAL_KEY_PREFIX + role) === "1"; }
  catch (e) { return true; }
}
function markTutorialSeen(role){
  try { localStorage.setItem(TUTORIAL_KEY_PREFIX + role, "1"); } catch (e) { /* non-fatal */ }
}
function maybeStartTutorial(role){
  if (hasTutorialBeenSeen(role)) return;
  tutorialActive = role;
  tutorialStep = 0;
  const first = TUTORIAL_STEPS[role][0];
  if (first.switchTab) mainTab = first.switchTab;
}
function isFlashTarget(name){
  if (!tutorialActive) return false;
  return TUTORIAL_STEPS[tutorialActive][tutorialStep].target === name;
}
function flashClass(name){ return isFlashTarget(name) ? "tutorial-flash" : ""; }

function normalizePhone(p){ return (p || "").replace(/\D/g, ""); }
function nameSlug(first, last){
  return (first.trim() + "-" + last.trim()).toLowerCase().replace(/[^a-z0-9-]/g, "");
}
function todayStr(){
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
}
function dateKey(y,m,d){ return `${y}-${String(m+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`; }
function formatDateChip(iso){
  const [y,m,d] = iso.split("-").map(Number);
  return new Date(y, m-1, d).toLocaleDateString(undefined, { month:"short", day:"numeric" });
}
function formatDateRanges(dates){
  if (!dates || !dates.length) return [];
  const sorted = [...dates].sort();
  const ranges = [];
  let start = sorted[0], prev = sorted[0];
  for (let i=1; i<sorted.length; i++){
    const cur = sorted[i];
    const diffDays = Math.round((new Date(cur) - new Date(prev)) / 86400000);
    if (diffDays === 1) {
      prev = cur;
    } else {
      ranges.push([start, prev]);
      start = cur; prev = cur;
    }
  }
  ranges.push([start, prev]);
  return ranges.map(([s,e]) => s === e ? formatDateChip(s) : `${formatDateChip(s)}–${formatDateChip(e)}`);
}
function getOverlap(datesA, datesB){
  const setB = new Set(datesB || []);
  return (datesA || []).filter(d => setB.has(d)).sort();
}
function escapeHtml(str){
  const d = document.createElement("div");
  d.innerText = str;
  return d.innerHTML;
}
function displayName(u){
  const name = `${u.firstName || ""} ${u.lastName || ""}`.trim();
  return name || (u.role === "employer" ? "Employer" : "Worker");
}
function computeCounts(items, field){
  const counts = {};
  items.forEach(item => (item[field] || []).forEach(d => { counts[d] = (counts[d]||0) + 1; }));
  return counts;
}

async function rememberSession(role, docId){
  try { localStorage.setItem(SESSION_KEY, JSON.stringify({ role, docId })); }
  catch (e) { /* non-fatal, e.g. private browsing */ }
}
async function forgetSession(){
  try { localStorage.removeItem(SESSION_KEY); }
  catch (e) { /* non-fatal */ }
}
async function readRememberedSession(){
  try {
    const raw = localStorage.getItem(SESSION_KEY);
    return raw ? JSON.parse(raw) : null;
  } catch (e) { return null; }
}

// ---------- bootstrap ----------
(async () => {
  const remembered = await readRememberedSession();
  if (remembered) {
    try {
      const snap = await getDoc(doc(db, remembered.role === "worker" ? "workers" : "employers", remembered.docId));
      if (snap.exists()) {
        currentUser = { docId: remembered.docId, role: remembered.role, ...snap.data() };
        selectedDates = new Set(currentUser[remembered.role === "worker" ? "availability" : "requestedDates"] || []);
        view = "main";
        maybeStartTutorial(remembered.role);
        attachListeners();
        render();
        return;
      } else {
        await forgetSession();
      }
    } catch (e) { /* fall through to role select */ }
  }
  view = "roleSelect";
  render();
})();

function attachListeners(){
  clearListeners();
  const uEmp = onSnapshot(collection(db, "employers"), (snap) => {
    allEmployers = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    if (view === "main" || view === "settings") render();
  }, () => {});
  unsubs.push(uEmp);

  const uHist = onSnapshot(collection(db, "completedWork"), (snap) => {
    allCompletedWork = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    if (view === "main" || view === "resume") render();
  }, () => {});
  unsubs.push(uHist);

  if (currentUser.role === "employer") {
    const uWork = onSnapshot(collection(db, "workers"), (snap) => {
      allWorkers = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      if (view === "main" || view === "settings") render();
    }, () => {});
    unsubs.push(uWork);
  }
}
function clearListeners(){ unsubs.forEach(u => u()); unsubs = []; }

// ---------- nav actions ----------
window.goRoleSelect = () => { view = "roleSelect"; formError=""; render(); };
window.goEmployerPin = () => { view = "employerPin"; formError=""; render(); };
window.goWorkerName = () => { view = "workerName"; formError=""; render(); };

window.submitPin = () => {
  const val = document.getElementById("pinInput").value.trim();
  if (val !== EMPLOYER_PIN) {
    formError = "That PIN isn't right. Ask whoever runs the board for the current code.";
    render();
    return;
  }
  formError = "";
  view = "employerName";
  render();
};

window.submitEmployerName = async () => {
  const first = document.getElementById("empFirst").value.trim();
  const last = document.getElementById("empLast").value.trim();
  const phone = document.getElementById("empPhone").value.trim();
  if (!first || !last || !phone) { formError = "First name, last name, and phone number are all required."; render(); return; }
  const slug = nameSlug(first, last);
  if (!slug) { formError = "Please enter a valid name."; render(); return; }
  try {
    const ref = doc(db, "employers", slug);
    const existing = await getDoc(ref);
    if (existing.exists()) {
      // always re-save name/phone on login — heals any older record that's missing it
      await setDoc(ref, { firstName: first, lastName: last, phone }, { merge: true });
      currentUser = { docId: slug, role: "employer", ...existing.data(), firstName: first, lastName: last, phone };
      selectedDates = new Set(currentUser.requestedDates || []);
    } else {
      await setDoc(ref, { firstName: first, lastName: last, phone, pin: EMPLOYER_PIN, requestedDates: [], createdAt: new Date().toISOString() });
      currentUser = { docId: slug, role: "employer", firstName: first, lastName: last, phone, requestedDates: [] };
      selectedDates = new Set();
    }
    await rememberSession("employer", slug);
    view = "main"; mainTab = "calendar"; formError = "";
    maybeStartTutorial("employer");
    attachListeners();
    render();
  } catch (e) {
    formError = "Couldn't sign you in — " + (e.message || "try again.");
    render();
  }
};

window.submitWorkerName = async () => {
  const first = document.getElementById("wFirstLookup").value.trim();
  const last = document.getElementById("wLastLookup").value.trim();
  if (!first || !last) { formError = "First and last name are both required."; render(); return; }
  const slug = nameSlug(first, last);
  if (!slug) { formError = "Please enter a valid name."; render(); return; }
  try {
    const ref = doc(db, "workers", slug);
    const existing = await getDoc(ref);
    if (existing.exists() && existing.data().phone) {
      // always re-save name on login — heals any older record that's missing it
      await setDoc(ref, { firstName: first, lastName: last }, { merge: true });
      currentUser = { docId: slug, role: "worker", ...existing.data(), firstName: first, lastName: last };
      selectedDates = new Set(currentUser.availability || []);
      await rememberSession("worker", slug);
      view = "main"; mainTab = "calendar"; formError = "";
      maybeStartTutorial("worker");
      attachListeners();
      render();
    } else {
      pendingWorker = { first, last, slug };
      formError = "";
      view = "workerInfo";
      render();
    }
  } catch (e) {
    formError = "Something went wrong — " + (e.message || "try again.");
    render();
  }
};

window.submitWorkerInfo = async () => {
  const phone = normalizePhone(document.getElementById("wPhone").value.trim());
  const age = parseInt(document.getElementById("wAge").value, 10);
  const parent = document.getElementById("wParent").value.trim();
  if (phone.length < 7 || !age || !parent) { formError = "All fields are required."; render(); return; }
  try {
    const { first, last, slug } = pendingWorker;
    const ref = doc(db, "workers", slug);
    const existing = await getDoc(ref);
    const priorAvailability = existing.exists() ? (existing.data().availability || []) : [];
    await setDoc(ref, {
      firstName: first, lastName: last, phone, age, parentName: parent,
      availability: priorAvailability, createdAt: new Date().toISOString()
    }, { merge: true });
    currentUser = { docId: slug, role: "worker", firstName: first, lastName: last, phone, age, parentName: parent, availability: priorAvailability };
    selectedDates = new Set(priorAvailability);
    await rememberSession("worker", slug);
    view = "main"; mainTab = "calendar"; formError = "";
    maybeStartTutorial("worker");
    attachListeners();
    render();
  } catch (e) {
    formError = "Couldn't save that — " + (e.message || "try again.");
    render();
  }
};

window.switchUser = async () => {

};

window.goSettings = () => { view = "settings"; render(); };
window.goMain = () => { view = "main"; render(); };

window.deleteMyEntry = async () => {

    await deleteDoc(doc(db, currentUser.role === "worker" ? "workers" : "employers", currentUser.docId));

window.setTab = (tab) => { mainTab = tab; render(); };

window.nextTutorialStep = () => {
  const steps = TUTORIAL_STEPS[tutorialActive];
  tutorialStep++;
  if (tutorialStep >= steps.length) {
    markTutorialSeen(tutorialActive);
    tutorialActive = null;
    tutorialStep = 0;
    render();
    return;
  }
  const step = steps[tutorialStep];
  if (step.switchTab) mainTab = step.switchTab;
  render();
};

window.skipTutorial = () => {
  markTutorialSeen(tutorialActive);
  tutorialActive = null;
  tutorialStep = 0;
  render();
};

window.replayTutorial = () => {
  tutorialActive = currentUser.role;
  tutorialStep = 0;
  const first = TUTORIAL_STEPS[currentUser.role][0];
  if (first.switchTab) mainTab = first.switchTab;
  view = "main";
  render();
};
window.navMonth = (delta) => {
  calMonth += delta;
  if (calMonth < 0) { calMonth = 11; calYear--; }
  if (calMonth > 11) { calMonth = 0; calYear++; }
  render();
};
window.toggleDay = (iso) => {
  if (iso < todayStr()) return;
  if (selectedDates.has(iso)) selectedDates.delete(iso); else selectedDates.add(iso);
  render();
};
window.confirmDates = async () => {
  const field = currentUser.role === "worker" ? "availability" : "requestedDates";
  const arr = Array.from(selectedDates).sort();
  try {
    await setDoc(doc(db, currentUser.role === "worker" ? "workers" : "employers", currentUser.docId), { [field]: arr }, { merge: true });
    currentUser[field] = arr;
    if (currentUser.role === "employer") {
      view = "employerJobInfo";
      render();
      return;
    }
    const flash = document.getElementById("savedFlash");
    if (flash) { flash.classList.add("show"); setTimeout(() => flash.classList.remove("show"), 1800); }
  } catch (e) {
    alert("Couldn't save: " + (e.message || e));
  }
};

window.saveJobInfo = async () => {
  const jobDescription = document.getElementById("jobDesc").value.trim();
  const payRate = document.getElementById("payRate").value.trim();
  try {
    await setDoc(doc(db, "employers", currentUser.docId), { jobDescription, payRate }, { merge: true });
    currentUser.jobDescription = jobDescription;
    currentUser.payRate = payRate;
  } catch (e) { /* non-fatal */ }
  view = "main"; mainTab = "calendar";
  render();
};
window.skipJobInfo = () => {
  view = "main"; mainTab = "calendar";
  render();
};

window.startMarkWorked = (idx) => {
  markWorkedContext = matchesCache[idx];
  markWorkedSelected = new Set(markWorkedContext.overlapDates);
  view = "markWorked";
  render();
};

window.toggleWorkedDay = (d) => {
  if (markWorkedSelected.has(d)) markWorkedSelected.delete(d); else markWorkedSelected.add(d);
};

window.confirmWorkDone = async () => {
  const ctx = markWorkedContext;
  const daysWorked = Array.from(markWorkedSelected).sort();
  if (!daysWorked.length) { alert("Select at least one day."); return; }

  try {
    await addDoc(collection(db, "completedWork"), {
      workerId: ctx.workerId, workerName: ctx.workerName,
      employerId: ctx.employerId, employerName: ctx.employerName,
      jobDescription: ctx.jobDescription || "", payRate: ctx.payRate || "",
      days: daysWorked, completedAt: new Date().toISOString()
    });
  } catch (e) {
    alert("Couldn't save to history — nothing else was changed: " + (e.message || e));
    return;
  }

  try {
    const workerRef = doc(db, "workers", ctx.workerId);
    const workerSnap = await getDoc(workerRef);
    const newAvailability = (workerSnap.exists() ? (workerSnap.data().availability || []) : []).filter(d => !daysWorked.includes(d));
    await setDoc(workerRef, { availability: newAvailability }, { merge: true });
    if (currentUser.role === "worker" && currentUser.docId === ctx.workerId) {
      currentUser.availability = newAvailability;
      selectedDates = new Set(newAvailability);
    }
  } catch (e) {
    alert("Saved to history, but couldn't update the worker's availability: " + (e.message || e));
  }

  try {
    const employerRef = doc(db, "employers", ctx.employerId);
    const employerSnap = await getDoc(employerRef);
    const newRequested = (employerSnap.exists() ? (employerSnap.data().requestedDates || []) : []).filter(d => !daysWorked.includes(d));
    await setDoc(employerRef, { requestedDates: newRequested }, { merge: true });
    if (currentUser.role === "employer" && currentUser.docId === ctx.employerId) {
      currentUser.requestedDates = newRequested;
      selectedDates = new Set(newRequested);
    }
  } catch (e) {
    alert("Saved to history, but couldn't update the employer's requested days: " + (e.message || e));
  }

  markWorkedContext = null;
  view = "main"; mainTab = "history";
  render();
};

window.openResume = (workerId) => {
  resumeWorkerId = workerId;
  view = "resume";
  render();
};

function renderCalendarGrid(){
  const first = new Date(calYear, calMonth, 1);
  const startDow = first.getDay();
  const daysInMonth = new Date(calYear, calMonth+1, 0).getDate();
  const monthName = first.toLocaleDateString(undefined, { month:"long", year:"numeric" });
  const isEmployer = currentUser.role === "employer";

  const empCounts = computeCounts(allEmployers, "requestedDates");
  const workerCounts = isEmployer ? computeCounts(allWorkers, "availability") : {};

  let cells = "";
  for (let i=0;i<startDow;i++) cells += `<div class="cal-day empty"></div>`;
  for (let d=1; d<=daysInMonth; d++){
    const iso = dateKey(calYear, calMonth, d);
    const isPast = iso < todayStr();
    const isSel = selectedDates.has(iso);
    const eCount = empCounts[iso] || 0;
    const wCount = workerCounts[iso] || 0;
    cells += `<div class="cal-day ${isPast?'past':''} ${isSel?'selected':''}" ${isPast ? '' : `onclick="toggleDay('${iso}')"`}>
      <span class="day-num">${d}</span>
      <span class="dot-row">
        ${eCount ? `<span class="dot dot-red" title="${eCount} employer(s) looking">${eCount}</span>` : ""}
        ${wCount ? `<span class="dot dot-blue" title="${wCount} worker(s) available">${wCount}</span>` : ""}
      </span>
    </div>`;
  }

  return `
    <div class="cal-header">
      <button onclick="navMonth(-1)" aria-label="Previous month">‹</button>
      <div class="cal-title">${monthName}</div>
      <button onclick="navMonth(1)" aria-label="Next month">›</button>
    </div>
    <div class="legend">
      <span><span class="sw" style="background:var(--select-gold)"></span> Your picks</span>
      <span><span class="sw" style="background:var(--pin-red)"></span> Employers looking</span>
      ${isEmployer ? `<span><span class="sw" style="background:var(--pin-blue)"></span> Workers available</span>` : ""}
    </div>
    <div class="cal-grid">
      ${["Su","Mo","Tu","We","Th","Fr","Sa"].map(d=>`<div class="cal-dow">${d}</div>`).join("")}
      ${cells}
    </div>
    <div class="save-row">
      <button class="btn ${flashClass('confirm-btn')}" onclick="confirmDates()">Confirm ${isEmployer ? "requested" : "available"} days</button>
      <span class="saved-flash" id="savedFlash">Saved ✓</span>
    </div>
  `;
}

function renderMatchesView(){
  matchesCache = [];
  if (currentUser.role === "worker") {
    const myDates = currentUser.availability || [];
    const matches = allEmployers
      .map(e => ({ e, overlap: getOverlap(myDates, e.requestedDates) }))
      .filter(m => m.overlap.length);
    return matches.length ? matches.map(({e, overlap}) => {
      const idx = matchesCache.length;
      matchesCache.push({
        workerId: currentUser.docId, workerName: displayName(currentUser),
        employerId: e.id, employerName: displayName(e),
        jobDescription: e.jobDescription || "", payRate: e.payRate || "",
        overlapDates: overlap
      });
      return `
      <div class="listing">
        <p class="listing-name">🤝 ${escapeHtml(e.firstName)} ${escapeHtml(e.lastName)}</p>
        ${e.phone ? `<p class="listing-meta">📞 ${escapeHtml(e.phone)}</p>` : ""}
        ${(e.jobDescription || e.payRate) ? `<p class="listing-meta">${escapeHtml(e.jobDescription||"")}${e.jobDescription && e.payRate ? " · " : ""}${escapeHtml(e.payRate||"")}</p>` : ""}
        <div>${formatDateRanges(overlap).map(r=>`<span class="date-chip">${r}</span>`).join("")}</div>
        <button class="btn small ${flashClass('mark-worked-btn')}" style="margin-top:10px;" onclick="startMarkWorked(${idx})">✅ Mark days worked</button>
      </div>
    `;
    }).join("") : `<div class="empty-state">No matches yet. Once your availability overlaps with an employer's request, they'll show up here.</div>`;
  }
  const myDates = currentUser.requestedDates || [];
  const matches = allWorkers
    .map(w => ({ w, overlap: getOverlap(myDates, w.availability) }))
    .filter(m => m.overlap.length);
  return matches.length ? matches.map(({w, overlap}) => {
    const idx = matchesCache.length;
    matchesCache.push({
      workerId: w.id, workerName: displayName(w),
      employerId: currentUser.docId, employerName: displayName(currentUser),
      jobDescription: currentUser.jobDescription || "", payRate: currentUser.payRate || "",
      overlapDates: overlap
    });
    return `
    <div class="listing">
      <p class="listing-name">🤝 ${escapeHtml(w.firstName)} ${escapeHtml(w.lastName)}, ${escapeHtml(String(w.age))}</p>
      <p class="listing-meta">📞 ${escapeHtml(w.phone)} &nbsp;·&nbsp; Parent: ${escapeHtml(w.parentName)}</p>
      <div>${formatDateRanges(overlap).map(r=>`<span class="date-chip">${r}</span>`).join("")}</div>

      </div>
    </div>
  `;
  }).join("") : `<div class="empty-state">No matches yet. Once a worker's availability overlaps with your request, they'll show up here.</div>`;
}

    root.innerHTML = `
      <div class="board-title">📌 Rent-A-Teenager</div>
      <div class="card pin-blue">
        <p class="eyebrow">Almost done</p>
        <h2 class="headline">What's the job?</h2>
        <label for="jobDesc">What kind of job?</label>
        <input id="jobDesc" type="text" placeholder="e.g. Sweeping the job site with a toothbrush" value="${escapeHtml(currentUser.jobDescription||"")}">
        <label for="payRate">What will you pay?</label>
        <input id="payRate" type="text" placeholder="e.g. $1.50/hr and a warm Gatorade" value="${escapeHtml(currentUser.payRate||"")}">
        <button class="btn full" onclick="saveJobInfo()">Save</button>
        <button class="btn full" style="background:var(--paper-dark);color:var(--ink);border:2px solid var(--ink);box-shadow:none;margin-top:10px;font-size:1.15rem;" onclick="skipJobInfo()">Skip →</button>
      </div>`;
    return;
  }

  if (view === "settings") {
    const isEmployer = currentUser.role === "employer";
    root.innerHTML = `
      <div class="board-title">📌 Rent-A-Teenager</div>
      <div class="card">
        <p class="eyebrow">Settings</p>
        <h2 class="headline">${escapeHtml(displayName(currentUser))}</h2>
        <p class="desc">Deleting removes this entry from Firebase for good — it won't come back by logging in again.</p>
        <button class="btn full" style="background:var(--pin-red)" onclick="deleteMyEntry()">Delete my entry</button>
        <button class="link-back" onclick="replayTutorial()">↻ Replay tutorial</button>
        <button class="link-back" onclick="goMain()">← Back</button>
      </div>
      ${isEmployer ? `
      <div class="card pin-blue">
        <p class="eyebrow">Manage all entries</p>
        <h2 class="headline">Workers</h2>
        ${allWorkers.length ? allWorkers.map(w => `
          <div class="listing" style="display:flex;justify-content:space-between;align-items:center;gap:10px;">
            <span class="listing-name" style="margin:0;">${escapeHtml(w.firstName)} ${escapeHtml(w.lastName)}</span>
            <button class="btn small" style="background:var(--pin-red)" onclick="deleteEntry('workers','${w.id}')">Delete</button>
          </div>
        `).join("") : `<div class="empty-state">No workers yet.</div>`}
        <h2 class="headline" style="margin-top:20px;">Employers</h2>
        ${allEmployers.length ? allEmployers.map(e => `
          <div class="listing" style="display:flex;justify-content:space-between;align-items:center;gap:10px;">
            <span class="listing-name" style="margin:0;">${escapeHtml(e.firstName)} ${escapeHtml(e.lastName)}</span>
            <button class="btn small" style="background:var(--pin-red)" onclick="deleteEntry('employers','${e.id}')">Delete</button>
          </div>
        `).join("") : `<div class="empty-state">No employers yet.</div>`}
      </div>` : ""}`;
    return;
  }

  if (view === "main") {
    root.innerHTML = `
      <div class="board-title">📌 Rent-A-Teenager</div>
      <div class="topbar">
        <div class="whoami"><strong>${escapeHtml(displayName(currentUser))}</strong><span class="badge ${currentUser.role}">${currentUser.role}</span></div>
        <span>
          <button class="switch-link ${flashClass('settings-btn')}" onclick="goSettings()">Settings ⚙️</button>
          &nbsp;·&nbsp;
          <button class="switch-link" onclick="switchUser()">Switch user</button>
        </span>
      </div>
      <div class="tabs">
        <button class="tab-btn ${mainTab==='calendar'?'active':''} ${flashClass('tab-calendar')}" onclick="setTab('calendar')">📅 Cal</button>
        <button class="tab-btn ${mainTab==='list'?'active':''} ${flashClass('tab-list')}" onclick="setTab('list')">📋 List</button>
        <button class="tab-btn ${mainTab==='matches'?'active':''} ${flashClass('tab-matches')}" onclick="setTab('matches')">🤝 Matches</button>
        <button class="tab-btn ${mainTab==='history'?'active':''} ${flashClass('tab-history')}" onclick="setTab('history')">🕒 History</button>
      </div>
      <div class="card">
        ${mainTab === 'calendar'
          ? `<p class="eyebrow">${currentUser.role === 'worker' ? 'Mark your availability' : 'Mark days you need help'}</p>` + renderCalendarGrid()
          : mainTab === 'matches'
          ? `<p class="eyebrow">Where you overlap</p>` + renderMatchesView()
          : mainTab === 'history'
          ? `<p class="eyebrow">Completed work</p>` + renderHistoryView()
          : `<p class="eyebrow">The board</p>` + renderListView()}
      </div>
      ${tutorialActive ? renderTutorialOverlay() : ""}`;
    return;
  }

  if (view === "markWorked") {
    const ctx = markWorkedContext;
    const isWorkerViewing = currentUser.role === "worker";
    const otherName = isWorkerViewing ? ctx.employerName : ctx.workerName;
    root.innerHTML = `
      <div class="board-title">📌 Rent-A-Teenager</div>
      <div class="card">
        <p class="eyebrow">Mark work done</p>
        <h2 class="headline">${isWorkerViewing ? `You worked for ${escapeHtml(otherName)}` : `${escapeHtml(otherName)} worked for you`}</h2>
        <p class="desc">Check off the days that actually happened. Anything left unchecked stays open on the calendar.</p>
        ${ctx.overlapDates.map(d => `
          <label style="display:flex;align-items:center;gap:10px;font-weight:400;margin:10px 0;font-size:1rem;">
            <input type="checkbox" ${markWorkedSelected.has(d) ? "checked" : ""} onchange="toggleWorkedDay('${d}')" style="width:auto;height:18px;">
            ${formatDateChip(d)}
          </label>
        `).join("")}
        <button class="btn full" onclick="confirmWorkDone()">Confirm completed days</button>
        <button class="link-back" onclick="goMain()">← Cancel</button>
      </div>`;
    return;
  }

  if (view === "resume") {
    root.innerHTML = renderResumeScreen();
    return;
  }
}

render();
</script>
</body>
</html>
