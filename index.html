<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rent-A-Teenager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        .calendar-day {
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid #ddd;
            cursor: pointer;
        }
        .calendar-day.selected {
            background-color: #3b82f6;
            color: white;
        }
        .nav-tab {
            padding: 12px 24px;
            cursor: pointer;
        }
        .nav-tab.active {
            border-bottom: 3px solid #3b82f6;
            font-weight: bold;
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <div class="max-w-4xl mx-auto bg-white min-h-screen shadow-xl">
        <!-- Header -->
        <div class="bg-blue-600 text-white p-4 flex justify-between items-center">
            <h1 class="text-2xl font-bold">Rent-A-Teenager</h1>
            <div id="user-info" class="text-sm hidden">
                <span id="current-user"></span>
                <button onclick="logout()" class="ml-4 text-xs bg-white text-blue-600 px-3 py-1 rounded">Switch User</button>
            </div>
        </div>

        <!-- Login Screen -->
        <div id="login-screen" class="p-8">
            <h2 class="text-3xl font-bold text-center mb-8">Welcome</h2>
            <div class="max-w-md mx-auto space-y-6">
                <button onclick="selectRole('employer')" 
                        class="w-full py-8 text-2xl font-semibold bg-white border-2 border-blue-600 hover:bg-blue-50 rounded-2xl">
                    I am an Employer 👔
                </button>
                <button onclick="selectRole('worker')" 
                        class="w-full py-8 text-2xl font-semibold bg-white border-2 border-green-600 hover:bg-green-50 rounded-2xl">
                    I am a Worker 👦
                </button>
            </div>
        </div>

        <!-- Employer PIN -->
        <div id="employer-pin-screen" class="p-8 hidden">
            <h2 class="text-2xl font-bold mb-6 text-center">Employer Access</h2>
            <input id="pin-input" type="password" placeholder="Enter PIN" maxlength="4"
                   class="w-full text-4xl text-center tracking-widest p-6 border-2 border-gray-300 rounded-xl focus:outline-none focus:border-blue-500">
            <button onclick="verifyPin()" 
                    class="w-full mt-6 bg-blue-600 text-white py-4 rounded-xl text-xl font-semibold">Submit</button>
            <button onclick="backToRole()" class="w-full mt-4 text-gray-500">Back</button>
        </div>

        <!-- Registration Form -->
        <div id="register-screen" class="p-8 hidden">
            <h2 id="register-title" class="text-2xl font-bold mb-6"></h2>
            <form id="register-form" class="space-y-4 max-w-md mx-auto">
                <input type="text" id="first-name" placeholder="First Name" required
                       class="w-full p-4 border rounded-xl">
                <input type="text" id="last-name" placeholder="Last Name" required
                       class="w-full p-4 border rounded-xl">
                
                <div id="worker-fields">
                    <input type="tel" id="phone" placeholder="Phone Number" required
                           class="w-full p-4 border rounded-xl">
                    <input type="number" id="age" placeholder="Age" min="13" max="19" required
                           class="w-full p-4 border rounded-xl">
                    <input type="text" id="parents-name" placeholder="Parent's Name" required
                           class="w-full p-4 border rounded-xl">
                </div>

                <button type="submit" 
                        class="w-full bg-green-600 text-white py-5 rounded-2xl text-xl font-semibold mt-6">
                    Continue
                </button>
            </form>
        </div>

        <!-- Main App -->
        <div id="main-app" class="hidden">
            <!-- Navigation -->
            <div class="flex border-b">
                <div onclick="showTab(0)" id="tab-calendar" class="nav-tab active flex-1 text-center">Calendar</div>
                <div onclick="showTab(1)" id="tab-list" class="nav-tab flex-1 text-center">List View</div>
            </div>

            <!-- Calendar Tab -->
            <div id="calendar-tab" class="p-6">
                <h3 id="calendar-title" class="text-xl font-semibold mb-4"></h3>
                <div id="calendar-grid" class="grid grid-cols-7 gap-2 text-center mb-8"></div>
                <button onclick="saveAvailability()" 
                        class="w-full bg-blue-600 text-white py-4 rounded-2xl text-lg font-semibold">
                    Confirm Availability
                </button>
            </div>

            <!-- List View Tab -->
            <div id="list-tab" class="p-6 hidden">
                <h3 class="text-xl font-semibold mb-4">All Requests & Availabilities</h3>
                <div id="list-content" class="space-y-4"></div>
            </div>
        </div>
    </div>

    <script>
        // ================== Firebase Config ==================
        const firebaseConfig = {
            apiKey: "AIzaSyDcc9Xmpyp4SXPYIP4RRUq3tydoKN2dW38",
            authDomain: "work-edfd5.firebaseapp.com",
            projectId: "work-edfd5",
            storageBucket: "work-edfd5.firebasestorage.app",
            messagingSenderId: "959829996640",
            appId: "1:959829996640:web:ec1adcc2ed886526db3f05"
        };

        let app, db;
        let currentUser = null;
        let selectedDates = new Set();

        function initFirebase() {
            app = firebase.initializeApp(firebaseConfig);
            db = firebase.firestore();
        }

        // ================== UI Helpers ==================
        function showScreen(screenId) {
            document.querySelectorAll('#login-screen, #employer-pin-screen, #register-screen, #main-app').forEach(el => {
                el.classList.add('hidden');
            });
            document.getElementById(screenId).classList.remove('hidden');
        }

        function selectRole(role) {
            if (role === 'employer') {
                showScreen('employer-pin-screen');
            } else {
                currentUser = { type: 'worker' };
                showRegisterForm();
            }
        }

        function verifyPin() {
            const pin = document.getElementById('pin-input').value;
            if (pin === "4321") {
                currentUser = { type: 'employer' };
                showRegisterForm();
            } else {
                alert("Incorrect PIN");
            }
        }

        function backToRole() {
            showScreen('login-screen');
        }

        function showRegisterForm() {
            const isWorker = currentUser.type === 'worker';
            document.getElementById('register-title').textContent = isWorker ? 
                "Worker Registration" : "Employer Registration";
            document.getElementById('worker-fields').style.display = isWorker ? 'block' : 'none';
            showScreen('register-screen');
        }

        // ================== Form Submit ==================
        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            currentUser.firstName = document.getElementById('first-name').value.trim();
            currentUser.lastName = document.getElementById('last-name').value.trim();
            
            if (currentUser.type === 'worker') {
                currentUser.phone = document.getElementById('phone').value.trim();
                currentUser.age = parseInt(document.getElementById('age').value);
                currentUser.parentsName = document.getElementById('parents-name').value.trim();
            }

            try {
                // Save user
                await db.collection('users').doc(getUserId()).set({
                    ...currentUser,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                
                localStorage.setItem('rentAteenUser', JSON.stringify(currentUser));
                loadMainApp();
            } catch (err) {
                console.error(err);
                alert("Error saving data");
            }
        });

        function getUserId() {
            return currentUser.type + '_' + currentUser.firstName.toLowerCase() + '_' + currentUser.lastName.toLowerCase();
        }

        // ================== Main App ==================
        function loadMainApp() {
            showScreen('main-app');
            document.getElementById('user-info').classList.remove('hidden');
            document.getElementById('current-user').textContent = 
                `${currentUser.firstName} ${currentUser.lastName} (${currentUser.type})`;
            
            renderCalendar();
            showTab(0);
            loadListView();
        }

        function renderCalendar() {
            const title = document.getElementById('calendar-title');
            title.textContent = currentUser.type === 'worker' ? 
                "Select days you are AVAILABLE" : "Select days you NEED help";
            
            const grid = document.getElementById('calendar-grid');
            grid.innerHTML = '';
            
            // Simple 31-day calendar for July 2026 (example)
            const startDate = new Date(2026, 6, 1); // July 2026
            for (let i = 1; i <= 31; i++) {
                const day = document.createElement('div');
                day.className = 'calendar-day text-sm';
                day.textContent = i;
                day.dataset.date = `2026-07-${i.toString().padStart(2, '0')}`;
                
                day.onclick = () => {
                    const dateStr = day.dataset.date;
                    if (selectedDates.has(dateStr)) {
                        selectedDates.delete(dateStr);
                        day.classList.remove('selected');
                    } else {
                        selectedDates.add(dateStr);
                        day.classList.add('selected');
                    }
                };
                grid.appendChild(day);
            }
        }

        async function saveAvailability() {
            if (selectedDates.size === 0) {
                alert("Please select at least one date");
                return;
            }

            try {
                await db.collection('schedules').doc(getUserId()).set({
                    userId: getUserId(),
                    userType: currentUser.type,
                    firstName: currentUser.firstName,
                    lastName: currentUser.lastName,
                    dates: Array.from(selectedDates),
                    isWorkerAvailability: currentUser.type === 'worker',
                    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                
                alert("Saved successfully!");
                loadListView();
            } catch (err) {
                console.error(err);
                alert("Error saving schedule");
            }
        }

        function showTab(tab) {
            document.getElementById('calendar-tab').classList.toggle('hidden', tab !== 0);
            document.getElementById('list-tab').classList.toggle('hidden', tab !== 1);
            
            document.getElementById('tab-calendar').classList.toggle('active', tab === 0);
            document.getElementById('tab-list').classList.toggle('active', tab === 1);
        }

        async function loadListView() {
            const container = document.getElementById('list-content');
            container.innerHTML = '<p class="text-gray-500">Loading...</p>';
            
            try {
                const snapshot = await db.collection('schedules').get();
                let html = '';
                
                snapshot.forEach(doc => {
                    const data = doc.data();
                    const isEmployerRequest = !data.isWorkerAvailability;
                    
                    // Permission logic
                    if (currentUser.type === 'worker' && data.isWorkerAvailability) {
                        return; // Workers don't see other workers
                    }
                    
                    html += `
                        <div class="border rounded-2xl p-5 bg-gray-50">
                            <div class="flex justify-between">
                                <div>
                                    <span class="font-semibold">${data.firstName} ${data.lastName}</span>
                                    <span class="ml-3 text-xs px-3 py-1 rounded-full ${isEmployerRequest ? 'bg-orange-100 text-orange-700' : 'bg-green-100 text-green-700'}">
                                        ${isEmployerRequest ? 'Needs Help' : 'Available'}
                                    </span>
                                </div>
                            </div>
                            <div class="mt-3 flex flex-wrap gap-2">
                                ${data.dates.map(date => `
                                    <span class="text-xs bg-white px-3 py-1 rounded-lg border">${date}</span>
                                `).join('')}
                            </div>
                        </div>
                    `;
                });
                
                container.innerHTML = html || '<p class="text-gray-500">No schedules yet.</p>';
            } catch (err) {
                console.error(err);
                container.innerHTML = '<p class="text-red-500">Error loading data</p>';
            }
        }

        function logout() {
            if (confirm("Switch user?")) {
                localStorage.removeItem('rentAteenUser');
                location.reload();
            }
        }

        // ================== Init ==================
        window.onload = () => {
            initFirebase();
            
            const savedUser = localStorage.getItem('rentAteenUser');
            if (savedUser) {
                currentUser = JSON.parse(savedUser);
                loadMainApp();
            } else {
                showScreen('login-screen');
            }
        };
    </script>
</body>
</html>
