<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rent-A-Teenager</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Kalam:wght@400;700&family=Karla:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#f2e9d8;
    --paper-dark:#e8dcc3;
    --corkboard:#a9825a;
    --ink:#2e2620;
    --pin-red:#c94f3d;
    --pin-blue:#3d6b8a;
    --tape:#f7f1de;
    --line:#c9b892;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(circle at 20% 20%, rgba(0,0,0,0.06) 0, transparent 40%),
      radial-gradient(circle at 80% 60%, rgba(0,0,0,0.05) 0, transparent 45%),
      var(--corkboard);
    background-blend-mode:multiply;
    min-height:100vh;
    font-family:'Karla',sans-serif;
    color:var(--ink);
  }
  body::before{
    content:"";
    position:fixed;inset:0;
    background-image:
      radial-gradient(rgba(0,0,0,0.15) 1px, transparent 1px);
    background-size:6px 6px;
    opacity:0.35;
    pointer-events:none;
    z-index:0;
  }
  h1,h2,h3,.headline{font-family:'Kalam',cursive;}
  #app{position:relative;z-index:1;max-width:720px;margin:0 auto;padding:24px 16px 60px;}

  .board-title{
    text-align:center;
    color:var(--tape);
    font-size:2.4rem;
    letter-spacing:1px;
    text-shadow:2px 2px 0 rgba(0,0,0,0.25);
    margin:8px 0 4px;
    transform:rotate(-1deg);
  }
  .board-sub{
    text-align:center;
    color:var(--tape);
    opacity:0.85;
    font-size:0.95rem;
    margin:0 0 24px;
  }

  .card{
    background:var(--paper);
    border-radius:2px;
    padding:24px;
    box-shadow:0 6px 16px rgba(0,0,0,0.35), 0 1px 0 rgba(255,255,255,0.4) inset;
    position:relative;
    margin-bottom:20px;
  }
  .card::before{
    content:"";
    position:absolute;
    top:-14px;left:50%;
    transform:translateX(-50%);
    width:26px;height:26px;
    background:radial-gradient(circle at 35% 30%, #e8746a, var(--pin-red));
    border-radius:50%;
    box-shadow:0 3px 4px rgba(0,0,0,0.4);
  }
  .card.pin-blue::before{
    background:radial-gradient(circle at 35% 30%, #6ea3c2, var(--pin-blue));
  }

  .eyebrow{
    text-transform:uppercase;
    letter-spacing:2px;
    font-size:0.7rem;
    font-weight:700;
    color:#8a7a5c;
    margin:0 0 6px;
  }
  h2.headline{font-size:1.6rem;margin:0 0 4px;}
  p.desc{margin:0 0 20px;color:#5c5142;font-size:0.92rem;line-height:1.4;}

  .role-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
  @media (max-width:480px){.role-grid{grid-template-columns:1fr;}}
  .role-btn{
    background:var(--tape);
    border:2px solid var(--ink);
    border-radius:2px;
    padding:22px 14px;
    text-align:center;
    cursor:pointer;
    font-family:'Kalam',cursive;
    font-size:1.25rem;
    transition:transform .12s ease, box-shadow .12s ease;
    box-shadow:3px 3px 0 rgba(0,0,0,0.25);
  }
  .role-btn:hover{transform:translate(-2px,-2px);box-shadow:5px 5px 0 rgba(0,0,0,0.25);}
  .role-btn:active{transform:translate(0,0);box-shadow:1px 1px 0 rgba(0,0,0,0.25);}
  .role-btn .emoji{font-size:2rem;display:block;margin-bottom:6px;}
  .role-btn .tag{display:block;font-family:'Karla',sans-serif;font-size:0.75rem;color:#7a6f5c;margin-top:4px;}

  label{display:block;font-weight:700;font-size:0.85rem;margin:14px 0 6px;}
  label:first-of-type{margin-top:0;}
  input, select{
    width:100%;
    padding:10px 12px;
    border:2px solid var(--line);
    border-radius:2px;
    background:#fffdf7;
    font-family:'Karla',sans-serif;
    font-size:1rem;
    color:var(--ink);
  }
  input:focus, select:focus, button:focus-visible{
    outline:3px solid var(--pin-blue);
    outline-offset:1px;
    border-color:var(--pin-blue);
  }
  .error-msg{
    color:#a3271f;
    background:#f8dcd7;
    border:1px solid #e0a89f;
    padding:8px 10px;
    border-radius:2px;
    font-size:0.85rem;
    margin-top:10px;
  }
  .hint{font-size:0.78rem;color:#8a7a5c;margin-top:4px;}

  .btn{
    display:inline-block;
    font-family:'Kalam',cursive;
    font-size:1.05rem;
    background:var(--ink);
    color:var(--paper);
    border:none;
    border-radius:2px;
    padding:12px 22px;
    cursor:pointer;
    box-shadow:3px 3px 0 rgba(0,0,0,0.3);
    transition:transform .1s ease;
  }
  .btn:hover{transform:translateY(-1px);}
  .btn:active{transform:translateY(1px);box-shadow:1px 1px 0 rgba(0,0,0,0.3);}
  .btn.full{width:100%;margin-top:18px;text-align:center;}
  .btn.secondary{background:transparent;color:var(--ink);border:2px solid var(--ink);box-shadow:none;}
  .btn.small{font-size:0.85rem;padding:6px 12px;}
  .link-back{
    display:inline-block;margin-top:14px;font-size:0.85rem;
    color:#6b6153;cursor:pointer;text-decoration:underline;
    background:none;border:none;font-family:'Karla',sans-serif;
  }

  /* header bar once logged in */
  .topbar{
    display:flex;justify-content:space-between;align-items:center;
    background:var(--tape);
    border:2px solid var(--ink);
    border-radius:2px;
    padding:12px 16px;
    margin-bottom:18px;
    box-shadow:3px 3px 0 rgba(0,0,0,0.25);
    flex-wrap:wrap;
    gap:8px;
  }
  .whoami{font-size:0.85rem;}
  .whoami strong{font-family:'Kalam',cursive;font-size:1.1rem;}
  .badge{
    display:inline-block;
    font-size:0.65rem;
    text-transform:uppercase;
    letter-spacing:1px;
    font-weight:700;
    padding:2px 8px;
    border-radius:10px;
    margin-left:6px;
    vertical-align:middle;
  }
  .badge.worker{background:#dcecd8;color:#2f5c2a;}
  .badge.employer{background:#dbe6ef;color:#26506e;}

  .tabs{display:flex;gap:8px;margin-bottom:16px;}
  .tab-btn{
    flex:1;
    font-family:'Kalam',cursive;
    font-size:1.05rem;
    padding:10px;
    background:var(--paper-dark);
    border:2px solid var(--ink);
    border-radius:2px;
    cursor:pointer;
    color:var(--ink);
  }
  .tab-btn.active{background:var(--ink);color:var(--paper);}

  .cal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
  .cal-header button{
    background:none;border:2px solid var(--ink);border-radius:50%;
    width:34px;height:34px;font-size:1rem;cursor:pointer;
  }
  .cal-title{font-family:'Kalam',cursive;font-size:1.3rem;}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
  .cal-dow{text-align:center;font-size:0.7rem;font-weight:700;color:#8a7a5c;padding-bottom:4px;}
  .cal-day{
    aspect-ratio:1/1;
    display:flex;align-items:center;justify-content:center;
    border:1.5px solid var(--line);
    border-radius:4px;
    background:#fffdf7;
    cursor:pointer;
    font-size:0.85rem;
    user-select:none;
  }
  .cal-day.empty{border:none;background:transparent;cursor:default;}
  .cal-day.past{color:#c4b9a3;background:#ece3ce;cursor:not-allowed;}
  .cal-day.selected{background:var(--pin-red);color:#fff;border-color:var(--pin-red);font-weight:700;}
  .cal-day.selected.employer-mode{background:var(--pin-blue);border-color:var(--pin-blue);}
  .cal-day:not(.empty):not(.past):hover{border-color:var(--ink);}

  .save-row{display:flex;align-items:center;gap:12px;margin-top:16px;}
  .saved-flash{color:#2f5c2a;font-size:0.85rem;font-weight:700;opacity:0;transition:opacity .3s;}
  .saved-flash.show{opacity:1;}

  .listing{
    background:#fffdf7;
    border:1.5px solid var(--line);
    border-radius:2px;
    padding:14px 16px;
    margin-bottom:10px;
  }
  .listing-name{font-family:'Kalam',cursive;font-size:1.15rem;margin:0 0 4px;}
  .listing-meta{font-size:0.8rem;color:#7a6f5c;margin:0 0 8px;}
  .date-chip{
    display:inline-block;
    background:var(--paper-dark);
    border:1px solid var(--line);
    border-radius:10px;
    padding:2px 9px;
    font-size:0.78rem;
    margin:2px 4px 2px 0;
  }
  .empty-state{
    text-align:center;color:#8a7a5c;font-size:0.9rem;
    padding:30px 10px;font-style:italic;
  }
  .section-label{
    font-family:'Kalam',cursive;font-size:1.1rem;
    margin:22px 0 10px;
    border-bottom:2px dashed var(--line);
    padding-bottom:4px;
  }
  .section-label:first-of-type{margin-top:0;}

  .switch-link{
    background:none;border:none;color:#6b6153;
    font-size:0.78rem;text-decoration:underline;cursor:pointer;
    font-family:'Karla',sans-serif;
  }

  .loading-msg{color:var(--tape);text-align:center;padding:60px 0;font-family:'Kalam',cursive;font-size:1.2rem;}

  @media (prefers-reduced-motion: reduce){
    .role-btn, .btn{transition:none;}
  }
</style>
</head>
<body>
<div id="app"><div class="loading-msg">Pinning up the corkboard…</div></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
import {
  getAuth, onAuthStateChanged, signInAnonymously, signOut
} from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";
import {
  getFirestore, doc, getDoc, setDoc, collection, onSnapshot
} from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDcc9Xmpyp4SXPYIP4RRUq3tydoKN2dW38",
  authDomain: "work-edfd5.firebaseapp.com",
  projectId: "work-edfd5",
  storageBucket: "work-edfd5.firebasestorage.app",
  messagingSenderId: "959829996640",
  appId: "1:959829996640:web:ec1adcc2ed886526db3f05"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const EMPLOYER_PIN = "4321"; // client-side pre-check only; the real gate is in Firestore rules

// ---------- app state ----------
let view = "loading"; // loading | roleSelect | employerPin | employerInfo | workerInfo | main
let currentUser = null; // { uid, role, ...profile }
let mainTab = "calendar"; // calendar | list
let calMonth = new Date().getMonth();
let calYear = new Date().getFullYear();
let selectedDates = new Set();
let formError = "";
let pinDraft = "";
let allWorkers = [];
let allEmployers = [];
let unsubs = [];

const root = document.getElementById("app");

function clearListeners(){
  unsubs.forEach(u => u());
  unsubs = [];
}

function todayStr(){
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
}

function dateKey(y,m,d){
  return `${y}-${String(m+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
}

function formatDateChip(iso){
  const [y,m,d] = iso.split("-").map(Number);
  const dt = new Date(y, m-1, d);
  return dt.toLocaleDateString(undefined, { month:"short", day:"numeric" });
}

// ---------- auth bootstrap ----------
onAuthStateChanged(auth, async (user) => {
  if (!user) {
    try {
      await signInAnonymously(auth);
    } catch (e) {
      root.innerHTML = `<div class="card"><h2 class="headline">Couldn't connect</h2><p class="desc">Anonymous sign-in failed. In the Firebase console, go to Authentication → Sign-in method, and make sure "Anonymous" is enabled. (${e.code || e.message})</p></div>`;
    }
    return;
  }
  const uid = user.uid;
  try {
    const [workerSnap, employerSnap] = await Promise.all([
      getDoc(doc(db, "workers", uid)),
      getDoc(doc(db, "employers", uid))
    ]);
    if (workerSnap.exists()) {
      currentUser = { uid, role: "worker", ...workerSnap.data() };
      selectedDates = new Set(currentUser.availability || []);
      view = "main";
      attachListeners();
    } else if (employerSnap.exists()) {
      currentUser = { uid, role: "employer", ...employerSnap.data() };
      selectedDates = new Set(currentUser.requestedDates || []);
      view = "main";
      attachListeners();
    } else {
      view = "roleSelect";
    }
  } catch (e) {
    view = "roleSelect";
  }
  render();
});

function attachListeners(){
  clearListeners();
  // everyone can read employer requests
  const uEmp = onSnapshot(collection(db, "employers"), (snap) => {
    allEmployers = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    if (view === "main" && mainTab === "list") render();
  }, () => {});
  unsubs.push(uEmp);

  if (currentUser.role === "employer") {
    const uWork = onSnapshot(collection(db, "workers"), (snap) => {
      allWorkers = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      if (view === "main" && mainTab === "list") render();
    }, () => {});
    unsubs.push(uWork);
  }
}

// ---------- actions ----------
window.goRoleSelect = () => { view = "roleSelect"; formError=""; render(); };
window.goEmployerPin = () => { view = "employerPin"; formError=""; pinDraft=""; render(); };
window.goWorkerInfo = () => { view = "workerInfo"; formError=""; render(); };

window.submitPin = () => {
  const val = document.getElementById("pinInput").value.trim();
  if (val !== EMPLOYER_PIN) {
    formError = "That PIN isn't right. Ask whoever runs the board for the current code.";
    render();
    return;
  }
  pinDraft = val;
  view = "employerInfo";
  formError = "";
  render();
};

window.submitEmployerInfo = async () => {
  const first = document.getElementById("empFirst").value.trim();
  const last = document.getElementById("empLast").value.trim();
  if (!first || !last) {
    formError = "First and last name are both required.";
    render();
    return;
  }
  try {
    const uid = auth.currentUser.uid;
    await setDoc(doc(db, "employers", uid), {
      firstName: first,
      lastName: last,
      pin: pinDraft,
      requestedDates: [],
      createdAt: new Date().toISOString()
    }, { merge: true });
    currentUser = { uid, role: "employer", firstName: first, lastName: last, requestedDates: [] };
    selectedDates = new Set();
    view = "main";
    mainTab = "calendar";
    attachListeners();
    render();
  } catch (e) {
    formError = "Couldn't save that — " + (e.message || "try again.");
    render();
  }
};

window.submitWorkerInfo = async () => {
  const first = document.getElementById("wFirst").value.trim();
  const last = document.getElementById("wLast").value.trim();
  const phone = document.getElementById("wPhone").value.trim();
  const age = parseInt(document.getElementById("wAge").value, 10);
  const parent = document.getElementById("wParent").value.trim();
  if (!first || !last || !phone || !age || !parent) {
    formError = "All fields are required.";
    render();
    return;
  }
  try {
    const uid = auth.currentUser.uid;
    await setDoc(doc(db, "workers", uid), {
      firstName: first,
      lastName: last,
      phone,
      age,
      parentName: parent,
      availability: [],
      createdAt: new Date().toISOString()
    }, { merge: true });
    currentUser = { uid, role: "worker", firstName: first, lastName: last, phone, age, parentName: parent, availability: [] };
    selectedDates = new Set();
    view = "main";
    mainTab = "calendar";
    attachListeners();
    render();
  } catch (e) {
    formError = "Couldn't save that — " + (e.message || "try again.");
    render();
  }
};

window.switchUser = async () => {
  if (!confirm("Switch to a different login? You can always come back by re-entering your info.")) return;
  clearListeners();
  currentUser = null;
  view = "loading";
  render();
  await signOut(auth);
  await signInAnonymously(auth);
};

window.setTab = (tab) => { mainTab = tab; render(); };

window.navMonth = (delta) => {
  calMonth += delta;
  if (calMonth < 0) { calMonth = 11; calYear--; }
  if (calMonth > 11) { calMonth = 0; calYear++; }
  render();
};

window.toggleDay = (iso) => {
  if (iso < todayStr()) return;
  if (selectedDates.has(iso)) selectedDates.delete(iso);
  else selectedDates.add(iso);
  render();
};

window.confirmDates = async () => {
  const field = currentUser.role === "worker" ? "availability" : "requestedDates";
  const arr = Array.from(selectedDates).sort();
  try {
    await setDoc(doc(db, currentUser.role === "worker" ? "workers" : "employers", currentUser.uid),
      { [field]: arr }, { merge: true });
    currentUser[field] = arr;
    const flash = document.getElementById("savedFlash");
    if (flash) {
      flash.classList.add("show");
      setTimeout(() => flash.classList.remove("show"), 1800);
    }
  } catch (e) {
    alert("Couldn't save: " + (e.message || e));
  }
};

// ---------- render helpers ----------
function renderCalendarGrid(){
  const first = new Date(calYear, calMonth, 1);
  const startDow = first.getDay();
  const daysInMonth = new Date(calYear, calMonth+1, 0).getDate();
  const monthName = first.toLocaleDateString(undefined, { month:"long", year:"numeric" });
  const isEmployer = currentUser.role === "employer";

  let cells = "";
  for (let i=0;i<startDow;i++) cells += `<div class="cal-day empty"></div>`;
  for (let d=1; d<=daysInMonth; d++){
    const iso = dateKey(calYear, calMonth, d);
    const isPast = iso < todayStr();
    const isSel = selectedDates.has(iso);
    cells += `<div class="cal-day ${isPast?'past':''} ${isSel?'selected':''} ${isSel && isEmployer ? 'employer-mode':''}"
      ${isPast ? '' : `onclick="toggleDay('${iso}')"`}>${d}</div>`;
  }

  return `
    <div class="cal-header">
      <button onclick="navMonth(-1)" aria-label="Previous month">‹</button>
      <div class="cal-title">${monthName}</div>
      <button onclick="navMonth(1)" aria-label="Next month">›</button>
    </div>
    <div class="cal-grid">
      ${["Su","Mo","Tu","We","Th","Fr","Sa"].map(d=>`<div class="cal-dow">${d}</div>`).join("")}
      ${cells}
    </div>
    <div class="save-row">
      <button class="btn" onclick="confirmDates()">Confirm ${isEmployer ? "requested" : "available"} days</button>
      <span class="saved-flash" id="savedFlash">Saved ✓</span>
    </div>
  `;
}

function renderListView(){
  if (currentUser.role === "worker") {
    const withDates = allEmployers.filter(e => (e.requestedDates||[]).length);
    return `
      <div class="section-label">Employers looking for help</div>
      ${withDates.length ? withDates.map(e => `
        <div class="listing">
          <p class="listing-name">${escapeHtml(e.firstName)} ${escapeHtml(e.lastName)}</p>
          <div>${(e.requestedDates||[]).map(d=>`<span class="date-chip">${formatDateChip(d)}</span>`).join("")}</div>
        </div>
      `).join("") : `<div class="empty-state">No one's posted a request yet. Check back soon.</div>`}
    `;
  }
  // employer view
  const withAvail = allWorkers.filter(w => (w.availability||[]).length);
  const otherEmployers = allEmployers.filter(e => e.id !== currentUser.uid);
  return `
    <div class="section-label">Available workers</div>
    ${withAvail.length ? withAvail.map(w => `
      <div class="listing">
        <p class="listing-name">${escapeHtml(w.firstName)} ${escapeHtml(w.lastName)}, ${escapeHtml(String(w.age))}</p>
        <p class="listing-meta">📞 ${escapeHtml(w.phone)} &nbsp;·&nbsp; Parent: ${escapeHtml(w.parentName)}</p>
        <div>${(w.availability||[]).map(d=>`<span class="date-chip">${formatDateChip(d)}</span>`).join("")}</div>
      </div>
    `).join("") : `<div class="empty-state">No workers have posted availability yet.</div>`}

    <div class="section-label">Other requests</div>
    ${otherEmployers.filter(e=>(e.requestedDates||[]).length).length ? otherEmployers.filter(e=>(e.requestedDates||[]).length).map(e => `
      <div class="listing">
        <p class="listing-name">${escapeHtml(e.firstName)} ${escapeHtml(e.lastName)}</p>
        <div>${(e.requestedDates||[]).map(d=>`<span class="date-chip">${formatDateChip(d)}</span>`).join("")}</div>
      </div>
    `).join("") : `<div class="empty-state">No other requests posted yet.</div>`}
  `;
}

function escapeHtml(str){
  const d = document.createElement("div");
  d.innerText = str;
  return d.innerHTML;
}

// ---------- main render ----------
function render(){
  if (view === "loading") {
    root.innerHTML = `<div class="loading-msg">Pinning up the corkboard…</div>`;
    return;
  }

  if (view === "roleSelect") {
    root.innerHTML = `
      <div class="board-title">📌 Rent-A-Teenager</div>
      <div class="board-sub">The neighborhood job board — post work, find work.</div>
      <div class="card">
        <p class="eyebrow">Get started</p>
        <h2 class="headline">Who are you?</h2>
        <p class="desc">Pick one to continue.</p>
        <div class="role-grid">
          <div class="role-btn" onclick="goWorkerInfo()">
            <span class="emoji">🧑‍🔧</span> Worker
            <span class="tag">I want to find work</span>
          </div>
          <div class="role-btn" onclick="goEmployerPin()">
            <span class="emoji">🏠</span> Employer
            <span class="tag">I need to hire help</span>
          </div>
        </div>
      </div>
    `;
    return;
  }

  if (view === "employerPin") {
    root.innerHTML = `
      <div class="board-title">📌 Rent-A-Teenager</div>
      <div class="card pin-blue">
        <p class="eyebrow">Employer access</p>
        <h2 class="headline">Enter the board PIN</h2>
        <p class="desc">Ask whoever runs the board if you don't have it.</p>
        <label for="pinInput">PIN</label>
        <input id="pinInput" type="password" inputmode="numeric" maxlength="4" autofocus>
        ${formError ? `<div class="error-msg">${formError}</div>` : ""}
        <button class="btn full" onclick="submitPin()">Continue</button>
        <button class="link-back" onclick="goRoleSelect()">← Back</button>
      </div>
    `;
    return;
  }

  if (view === "employerInfo") {
    root.innerHTML = `
      <div class="board-title">📌 Rent-A-Teenager</div>
      <div class="card pin-blue">
        <p class="eyebrow">Employer access</p>
        <h2 class="headline">Your name</h2>
        <label for="empFirst">First name</label>
        <input id="empFirst" type="text" autofocus>
        <label for="empLast">Last name</label>
        <input id="empLast" type="text">
        ${formError ? `<div class="error-msg">${formError}</div>` : ""}
        <button class="btn full" onclick="submitEmployerInfo()">Enter the board</button>
        <button class="link-back" onclick="goEmployerPin()">← Back</button>
      </div>
    `;
    return;
  }

  if (view === "workerInfo") {
    root.innerHTML = `
      <div class="board-title">📌 Rent-A-Teenager</div>
      <div class="card">
        <p class="eyebrow">Worker sign-up</p>
        <h2 class="headline">Tell us about you</h2>
        <label for="wFirst">First name</label>
        <input id="wFirst" type="text" autofocus>
        <label for="wLast">Last name</label>
        <input id="wLast" type="text">
        <label for="wPhone">Phone number</label>
        <input id="wPhone" type="tel">
        <label for="wAge">Age</label>
        <input id="wAge" type="number" min="13" max="19">
        <label for="wParent">Parent/guardian name</label>
        <input id="wParent" type="text">
        <p class="hint">Employers can see this info to contact you about work.</p>
        ${formError ? `<div class="error-msg">${formError}</div>` : ""}
        <button class="btn full" onclick="submitWorkerInfo()">Enter the board</button>
        <button class="link-back" onclick="goRoleSelect()">← Back</button>
      </div>
    `;
    return;
  }

  if (view === "main") {
    root.innerHTML = `
      <div class="board-title">📌 Rent-A-Teenager</div>
      <div class="topbar">
        <div class="whoami">
          <strong>${escapeHtml(currentUser.firstName)} ${escapeHtml(currentUser.lastName)}</strong>
          <span class="badge ${currentUser.role}">${currentUser.role}</span>
        </div>
        <button class="switch-link" onclick="switchUser()">Switch user</button>
      </div>
      <div class="tabs">
        <button class="tab-btn ${mainTab==='calendar'?'active':''}" onclick="setTab('calendar')">📅 Calendar</button>
        <button class="tab-btn ${mainTab==='list'?'active':''}" onclick="setTab('list')">📋 List view</button>
      </div>
      <div class="card">
        ${mainTab === 'calendar'
          ? `<p class="eyebrow">${currentUser.role === 'worker' ? 'Mark your availability' : 'Mark days you need help'}</p>` + renderCalendarGrid()
          : `<p class="eyebrow">The board</p>` + renderListView()}
      </div>
    `;
    return;
  }
}

render();
</script>
</body>
</html>
